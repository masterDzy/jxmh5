<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡片效果 - 图片背景</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 375px;
      height: 667px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      position: relative;
      overflow: hidden;
    }

    /* 背景层 */
    .card-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
      background: #fafafa;
    }

    .card-bg-svg {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 108px;
      height: auto;
      pointer-events: none;
      z-index: 2;
      opacity: 1;
    }

    .card-bg-svg .leaf {
      transform-origin: 95px 37px;
    }

    .card-bg-svg.card-hand {
      top: auto;
      bottom: 0;
      left: 0;
      transform: none;
      width: 105px;
      z-index: 3;
    }

    .color-label {
      position: absolute;
      top: 2px;
      left: 10px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      z-index: 10;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    /* 按钮层 */
    .card-buttons {
      position: absolute;
      top: 466px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 20;
      background: transparent;
    }

    .cta {
      background: #da5342;
      color: #ffffff;
      border: 1px solid #da5342;
      padding: 8px 26px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      line-height: 1;
      cursor: pointer;
      transition: all 0.3s ease;
      min-height: 34px;
      box-sizing: border-box;
    }

    .cta:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }
  </style>
</head>

  <script>
    // 树叶开合动画 - GSAP Scale
    const leaves = document.querySelectorAll('.leaf');
    leaves.forEach((leaf, i) => {
      let moveCount = 0;
      const duration = 1.5 + i * 0.3;
      const pauseAfterMoves = 2;
      const pauseDuration = 0.02;

      function animateLeaf() {
        moveCount++;
        gsap.to(leaf, {
          scale: 0.97,
          transformOrigin: '95px 37px',
          duration: duration,
          ease: 'sine.inOut',
          onComplete: () => {
            moveCount++;
            gsap.to(leaf, {
              scale: 1,
              transformOrigin: '95px 37px',
              duration: duration,
              ease: 'sine.inOut',
              onComplete: () => {
                if (moveCount >= pauseAfterMoves) {
                  moveCount = 0;
                  setTimeout(animateLeaf, pauseDuration * 1000);
                } else {
                  animateLeaf();
                }
              }
            });
          }
        });
      }
      animateLeaf();
    });

    // 树枝摇晃动画 - 3根树枝作为一个整体向右倾斜
    const branchesGroup = document.getElementById('branches');
    let branchMoveCount = 0;
    const branchDuration = 3;
    const branchPauseAfterMoves = 4;
    const branchPauseDuration = 0.5;
    const skewAngle = 28;

    function animateBranches() {
      branchMoveCount++;
      gsap.to(branchesGroup, {
        skewX: skewAngle,
        duration: branchDuration,
        ease: 'sine.inOut',
        onComplete: () => {
          branchMoveCount++;
          gsap.to(branchesGroup, {
            skewX: 0,
            duration: branchDuration,
            ease: 'sine.inOut',
            onComplete: () => {
              if (branchMoveCount >= branchPauseAfterMoves) {
                branchMoveCount = 0;
                setTimeout(animateBranches, branchPauseDuration * 1000);
              } else {
                animateBranches();
              }
            }
          });
        }
      });
    }
    animateBranches();
  </script>
